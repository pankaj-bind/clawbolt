name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras
      - run: uv run ruff check backend/ tests/ alembic/
      - run: uv run ruff format --check backend/ tests/ alembic/

  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite:///:memory:"
      TWILIO_VALIDATE_SIGNATURES: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras
      - run: uv run pytest -v

  e2e-twilio:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    env:
      DATABASE_URL: "sqlite:///:memory:"
      TWILIO_VALIDATE_SIGNATURES: "false"
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
      TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
      TWILIO_TEST_TO_NUMBER: ${{ secrets.TWILIO_TEST_TO_NUMBER }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras
      - run: uv run pytest -m e2e -v --timeout=60

  migration-check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite:///test_migrations.db"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras
      - run: uv run alembic upgrade head
      - run: uv run alembic check
