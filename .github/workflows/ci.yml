name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras
      - run: uv run ruff check backend/ tests/ alembic/
      - run: uv run ruff format --check backend/ tests/ alembic/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras
      - run: uv run ty check --python .venv backend/ tests/

  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite:///:memory:"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras
      - run: uv run pytest -v

  e2e-telegram:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite:///:memory:"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_TEST_CHAT_ID: ${{ secrets.TELEGRAM_TEST_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras
      - run: uv run pytest -m e2e -v --timeout=60

  integration:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite:///:memory:"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras
      - run: uv run pytest -m integration -v --timeout=120

  migration-check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite:///test_migrations.db"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras
      - run: uv run alembic upgrade head
      - run: uv run alembic check
