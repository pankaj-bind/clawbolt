<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="doorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8872e"/>
      <stop offset="100%" stop-color="#d4711a"/>
    </linearGradient>
  </defs>

  <!-- Shop door icon -->
  <g transform="translate(12, 12)">
    <!-- Door frame -->
    <rect x="0" y="8" width="52" height="68" rx="4" fill="#1a2332"/>
    <!-- Door panel -->
    <rect x="6" y="14" width="40" height="56" rx="2" fill="url(#doorGrad)"/>
    <!-- Door window -->
    <rect x="12" y="20" width="28" height="18" rx="2" fill="#1a2332" opacity="0.25"/>
    <!-- Window crossbar horizontal -->
    <line x1="12" y1="29" x2="40" y2="29" stroke="#1a2332" stroke-width="1.5" opacity="0.3"/>
    <!-- Window crossbar vertical -->
    <line x1="26" y1="20" x2="26" y2="38" stroke="#1a2332" stroke-width="1.5" opacity="0.3"/>
    <!-- Door handle -->
    <circle cx="35" cy="48" r="2.5" fill="#1a2332" opacity="0.4"/>
    <!-- Roof / awning -->
    <polygon points="-4,8 56,8 60,0 -8,0" fill="#1a2332"/>
  </g>

  <!-- "backshop.ai" as single text element so .ai flows directly after backshop -->
  <text x="76" y="62" font-family="'Inter', 'Helvetica Neue', 'Arial', sans-serif" font-size="46" font-weight="700" letter-spacing="-1.5">
    <tspan fill="#1a2332">backshop</tspan><tspan fill="#e8872e">.ai</tspan>
  </text>
</svg>