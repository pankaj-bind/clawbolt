services:
  app:
    build: .
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      LOG_LEVEL: debug
    env_file:
      - path: .env
        required: false
    volumes:
      - ${CLAWBOLT_DATA_DIR:-./data}:/app/data
    command: ["sh", "-c", "uv run uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --log-level $${LOG_LEVEL:-info}"]

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://app:8000 --metrics 0.0.0.0:2000
    depends_on:
      - app
