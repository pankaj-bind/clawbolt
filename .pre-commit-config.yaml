repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: ty
        name: ty (type checking)
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false
      - id: vulture
        name: vulture (dead code detection)
        entry: uv run vulture backend/ tests/ vulture_whitelist.py --min-confidence 80
        language: system
        types: [python]
        pass_filenames: false
